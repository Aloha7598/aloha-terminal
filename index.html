<!DOCTYPE html>
<html>
<head>
<title>Aloha Terminal</title>

<style>
body {
  background:#0b0f1a;
  color:#e6edf3;
  font-family:Arial;
}

.nav {
  display:flex;
  gap:20px;
  padding:15px;
}

.nav-item {
  cursor:pointer;
  color:#6b7280;
}

.nav-item.active {
  color:#00ffa3;
}

.section { display:none; }
.section.active { display:block; }

.card {
  background:#111827;
  padding:15px;
  margin:10px;
  border-radius:10px;
}

.green { color:#00ffa3 }
.red { color:#ff4d6d }

.title {
  font-size:13px;
  color:#9ca3af;
  margin-bottom:8px;
}

.value {
  font-size:18px;
}
</style>

</head>

<body>

<h2 style="padding:10px;">ALOHA / TERMINAL</h2>

<div class="nav">
  <div class="nav-item active" onclick="switchTab('overview')">Overview</div>
  <div class="nav-item" onclick="switchTab('smart')">Smart Money</div>
</div>


<!-- ================= OVERVIEW ================= -->
<div id="overview" class="section active">

  <div class="card">
    <div class="title">PRICES</div>
    <div id="btc" class="value">BTC: —</div>
    <div id="eth" class="value">ETH: —</div>
  </div>

  <div class="card">
    <div class="title">AI SIGNAL</div>
    <div id="signal">Loading...</div>
    <div id="signal-details" style="font-size:12px; opacity:0.7;"></div>
  </div>

</div>


<!-- ================= SMART MONEY ================= -->
<div id="smart" class="section">

  <div class="card">
    <div class="title">SMART MONEY SIGNAL</div>
    <div id="smart-summary" class="value">Loading...</div>
  </div>

  <div class="card">
    <div class="title">WHALES</div>
    <div id="smart-whales"></div>
  </div>

  <div class="card">
    <div class="title">CEX FLOW</div>
    <div id="cex-flow"></div>
    <div id="cex-interpret"></div>
  </div>

  <div class="card">
    <div class="title">CHIP HOLDERS</div>
    <div id="chip-holders"></div>
  </div>

</div>


<script>

const API = "https://aloha-terminal.onrender.com";

function switchTab(tab) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(tab).classList.add('active');

  if(tab === 'smart') loadSmart();
}


// ================= OVERVIEW =================
async function loadOverview() {

  const p = await fetch(API + '/api/prices').then(r=>r.json());

  document.getElementById('btc').innerText = "BTC: $" + p['BTC-USD'].price;
  document.getElementById('eth').innerText = "ETH: $" + p['ETH-USD'].price;


  const s = await fetch(API + '/api/signal').then(r=>r.json());

  let color = "#ccc";
  if(s.status === "BULLISH") color = "#00ffa3";
  if(s.status === "RISK") color = "#ff4d6d";

  document.getElementById('signal').innerHTML =
    `<span style="color:${color}">${s.status}</span>`;

  document.getElementById('signal-details').innerText =
    s.details.join(", ");
}


// ================= SMART =================
async function loadSmart() {

  const d = await fetch(API + '/api/smartmoney').then(r=>r.json());

  document.getElementById('smart-summary').innerHTML =
    d.cex_signal === "ACCUMULATION"
      ? '<span class="green">🟢 ACCUMULATION</span>'
      : '<span class="red">🔴 DISTRIBUTION</span>';

  document.getElementById('smart-whales').innerHTML =
    d.whales.map(w =>
      `<div class="${w.type==='buy'?'green':'red'}">
        ${w.type==='buy'?'+':'-'} ${w.label} $${w.amount}
      </div>`
    ).join('');

  document.getElementById('cex-flow').innerText =
    "Net Flow: $" + d.cex_flow;

  document.getElementById('cex-interpret').innerHTML =
    d.cex_signal === "ACCUMULATION"
      ? '<span class="green">Funds leaving exchanges → bullish</span>'
      : '<span class="red">Funds entering exchanges → bearish</span>';

  document.getElementById('chip-holders').innerHTML =
    d.chip.map(h =>
      `<div>${h.wallet} (+${h.pnl}%)</div>`
    ).join('');
}


// INIT
loadOverview();

</script>

</body>
</html>
