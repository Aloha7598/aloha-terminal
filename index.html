<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aloha Terminal</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { background:#0a0a0f; color:white; font-family:sans-serif; }
.nav { display:flex; gap:10px; padding:10px; }
.nav-item { cursor:pointer; opacity:.5; }
.nav-item.active { opacity:1; color:#00e5a0; }

.section { display:none; padding:10px; }
.section.active { display:block; }

.card { background:#111; padding:10px; margin-bottom:10px; border-radius:8px; }
.green { color:#00e5a0 }
.red { color:#ff4466 }
</style>
</head>

<body>

<div class="nav">
  <div class="nav-item active" onclick="switchTab('overview')">Overview</div>
  <div class="nav-item" onclick="switchTab('smart')">Smart Money</div>
</div>

<div class="section active" id="sec-overview">
  <div class="card">
    <h3>Prices</h3>
    <div id="btc">BTC: —</div>
    <div id="eth">ETH: —</div>
  </div>

  <div class="card">
    <h3>AI Signal</h3>
    <div id="signal">Loading...</div>
  </div>
</div>

<div class="section" id="sec-smart">

  <div class="card">
    <h3>Whales</h3>
    <div id="smart-whales">Loading...</div>
  </div>

  <div class="card">
    <h3>CEX Flow</h3>
    <div id="cex-flow">—</div>
    <div id="cex-signal">—</div>
  </div>

  <div class="card">
    <h3>CHIP Holders</h3>
    <div id="chip-holders">—</div>
  </div>

</div>

<script>
const API_BASE = "https://aloha-terminal.onrender.com";

function switchTab(tab) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('sec-' + tab).classList.add('active');

  if(tab === 'smart') fetchSmartMoney();
}

async function fetchPrices() {
  try {
    const res = await fetch(API_BASE + '/api/prices');
    const data = await res.json();

    document.getElementById('btc').textContent =
      "BTC: $" + data['BTC-USD'].price;

    document.getElementById('eth').textContent =
      "ETH: $" + data['ETH-USD'].price;

  } catch(e) {
    console.log(e);
  }
}

async function fetchSmartMoney() {
  try {
    const res = await fetch(API_BASE + '/api/smartmoney');
    const d = await res.json();

    // whales
    document.getElementById('smart-whales').innerHTML =
      (d.whales || []).map(w =>
        `<div class="${w.type==='buy'?'green':'red'}">${w.label} $${w.amount}</div>`
      ).join('');

    // flow
    document.getElementById('cex-flow').textContent = '$' + d.cex_flow;

    document.getElementById('cex-signal').textContent =
      d.cex_flow < 0 ? 'ACCUMULATION' : 'DISTRIBUTION';

    // chip
    document.getElementById('chip-holders').innerHTML =
      (d.chip || []).map(h =>
        `<div>${h.wallet} (${h.pnl}%)</div>`
      ).join('');

  } catch(e) {
    console.log(e);
  }
}

function init() {
  fetchPrices();
}

init();
</script>

</body>
</html>
