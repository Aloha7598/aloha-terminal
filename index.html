<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aloha Terminal</title>

<style>
body { background:#0a0a0f; color:white; font-family:sans-serif; margin:0; }

.nav { display:flex; gap:15px; padding:10px; border-bottom:1px solid #222; }
.nav-item { cursor:pointer; opacity:.5; }
.nav-item.active { opacity:1; color:#00e5a0; }

.section { display:none; padding:10px; }
.section.active { display:block; }

.card { background:#111; padding:10px; margin-bottom:10px; border-radius:8px; }

.green { color:#00e5a0 }
.red { color:#ff4466 }
</style>
</head>

<body>

<h2 style="padding:10px">ALOHA / TERMINAL</h2>

<div class="nav">
  <div class="nav-item active" onclick="switchTab('overview', this)">Overview</div>
  <div class="nav-item" onclick="switchTab('smart', this)">Smart Money</div>
</div>

<!-- OVERVIEW -->
<div class="section active" id="sec-overview">
  <div class="card">
    <h3>Prices</h3>
    <div id="btc">Loading...</div>
    <div id="eth">Loading...</div>
  </div>

  <div class="card">
    <h3>AI Signal</h3>
    <div id="signal">Loading...</div>
  </div>
</div>

<!-- SMART MONEY -->
<div class="section" id="sec-smart">

  <div class="card">
    <h3>Whales</h3>
    <div id="smart-whales">Loading...</div>
  </div>

  <div class="card">
    <h3>CEX Flow</h3>
    <div id="cex-flow">—</div>
    <div id="cex-signal">—</div>
  </div>

  <div class="card">
    <h3>CHIP Holders</h3>
    <div id="chip-holders">—</div>
  </div>

</div>

<script>
const API = window.location.origin;

// =======================
// TAB SWITCH (FIXED)
// =======================
function switchTab(tab, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

  el.classList.add('active');
  document.getElementById('sec-' + tab).classList.add('active');

  if (tab === 'smart') loadSmartMoney();
}

// =======================
// PRICES
// =======================
async function loadPrices() {
  try {
    const r = await fetch(API + '/api/prices');
    const d = await r.json();

    document.getElementById('btc').textContent =
      "BTC: $" + (d.BTC || 0);

    document.getElementById('eth').textContent =
      "ETH: $" + (d.ETH || 0);

  } catch(e) {
    console.log(e);
  }
}

// =======================
// AI SIGNAL (simple)
// =======================
async function loadSignal() {
  document.getElementById('signal').innerHTML =
    `<span class="green">NEUTRAL</span><br>
     BTC stable, no clear edge.`;
}

// =======================
// SMART MONEY
// =======================
async function loadSmartMoney() {
  try {
    const r = await fetch(API + '/api/smartmoney');
    const d = await r.json();

    // whales
    document.getElementById('smart-whales').innerHTML =
      (d.whales || []).map(w =>
        `<div class="${w.type==='buy'?'green':'red'}">
          ${w.label} $${w.amount}
        </div>`
      ).join('') || "No data";

    // flow
    document.getElementById('cex-flow').textContent =
      "$" + (d.cex_flow || 0);

    document.getElementById('cex-signal').textContent =
      d.cex_flow < 0 ? "ACCUMULATION" : "DISTRIBUTION";

    // chip holders
    document.getElementById('chip-holders').innerHTML =
      (d.chip || []).map(h =>
        `<div>${h.wallet} (${h.pnl}%)</div>`
      ).join('') || "No data";

  } catch(e) {
    console.log(e);
  }
}

// =======================
// INIT
// =======================
function init() {
  loadPrices();
  loadSignal();
}

init();
</script>

</body>
</html>
